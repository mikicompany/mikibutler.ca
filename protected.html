<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Work — Miki Butler</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo" aria-label="Miki Butler home"><img src="images/logo512.jpg" alt="Miki Butler" /></a>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-socials" id="sidebar-socials"></div>
    <p class="sidebar-copy">© All rights reserved<br>Miki Butler</p>
  </aside>

  <main>
    <div class="protected-page">
      <div class="protected-inner" id="pw-gate">
        <div style="margin-bottom:28px">
          <img src="images/logo512.jpg" alt="Miki Butler" style="width:72px;height:72px;border-radius:50%;object-fit:contain;display:block;margin:0 auto" />
        </div>
        <h1>Protected Material</h1>
        <p>This section contains work under NDA or not yet publicly released.<br>Enter the password to view.</p>
        <form class="protected-form" id="pw-form">
          <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
          <button type="submit" class="btn-accent">Enter</button>
        </form>
        <p id="pw-error" style="color:#ff4444;font-size:12px;margin-top:12px;min-height:18px"></p>
      </div>

      <div id="protected-content" style="display:none;width:100%">
        <div class="work-header">
          <h1>Protected Work</h1>
        </div>
        <div class="masonry-grid">
          <div class="masonry-item" data-title="Protected — NDA Project">
            <img src="images/work/protected-01.jpg" alt="Protected NDA project" loading="lazy" />
            <div class="item-overlay">
              <span class="item-tag">NDA</span>
              <span class="item-title">Unreleased Project</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <span class="lightbox-close" aria-label="Close">&times;</span>
    <button class="lightbox-prev" aria-label="Previous">&#8249;</button>
    <img class="lb-img" src="" alt="" />
    <button class="lightbox-next" aria-label="Next">&#8250;</button>
    <div class="lightbox-caption"></div>
  </div>

  <script src="js/sidebar.js"></script>
</body>
</html>
