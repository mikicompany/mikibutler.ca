  <main>
    <div class="protected-page">
      <div class="protected-inner" id="pw-gate">
        <div style="margin-bottom:28px">
          <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
            <circle cx="30" cy="30" r="28" stroke="#a0ff00" stroke-width="3"/>

          </svg>
        </div>
        <h1>Protected Material</h1>
        <p>This section contains work under NDA or not yet publicly released.<br>Enter the password to view.</p>
        <form class="protected-form" id="pw-form">
          <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
          <button type="submit" class="btn-accent">Enter</button>
        </form>
        <p id="pw-error" style="color:#ff4444;font-size:12px;margin-top:12px;min-height:18px"></p>
      </div>

      <div id="protected-content" style="display:none;width:100%">
        <div class="work-header">
          <h1>Protected Work</h1>
        </div>
        <div class="masonry-grid">
          <div class="masonry-item" data-title="Protected — NDA Project">
            <img src="images/work/protected-01.jpg" alt="Protected NDA project" loading="lazy" />
            <div class="item-overlay">
              <span class="item-tag">NDA</span>
              <span class="item-title">Unreleased Project</span>
            </div>
          </div>
        </div>
      </div>
    </div>
