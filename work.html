<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Miki Butler</title>
  <meta name="description" content="Portfolio of environment art by Miki Butler — Starship Troopers Extermination, Dead Rising 4, Plants vs Zombies, and more." />
  <meta name="keywords" content="environment art portfolio, game art, 3D environments, Starship Troopers, Dead Rising, Miki Butler" />
  <link rel="canonical" href="https://mikibutler.ca/work.html" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo" aria-label="Miki Butler home">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" stroke="#a0ff00" stroke-width="3"/>
        <text x="30" y="38" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="26" fill="#a0ff00">M</text>
      </svg>
    </a>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-socials" id="sidebar-socials"></div>
    <p class="sidebar-copy">© All rights reserved<br>Miki Butler</p>
  </aside>

  <main>
    <div class="work-header">
      <h1>Work</h1>
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
      </div>
    </div>
    <div class="masonry-grid" id="work-grid"></div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <span class="lightbox-close" aria-label="Close">&times;</span>
    <button class="lightbox-prev" aria-label="Previous">&#8249;</button>
    <img class="lb-img" src="" alt="" />
    <button class="lightbox-next" aria-label="Next">&#8250;</button>
    <div class="lightbox-caption"></div>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
    const CATEGORY_LABELS = {
      'starship-troopers': 'Starship Troopers',
      'dead-rising': 'Dead Rising',
      'pvz': 'Plants vs Zombies',
      'other': 'Other'
    };

    let allItems = [];
    let lightboxItems = [];
    let lightboxIndex = 0;

    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        buildFilters(data.work);
        buildGrid(data.work);
        allItems = data.work;
      });

    function buildFilters(items) {
      const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
      const container = document.getElementById('filters');
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = cat;
        btn.textContent = CATEGORY_LABELS[cat] || cat;
        container.appendChild(btn);
      });

      container.addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterGrid(btn.dataset.filter);
      });
    }

    function buildGrid(items) {
      const grid = document.getElementById('work-grid');
      grid.innerHTML = '';
      lightboxItems = items;

      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'masonry-item';
        div.dataset.category = item.category || '';
        div.dataset.index = i;
        div.innerHTML = `
          <img src="${item.img}" alt="${item.title}" loading="lazy" />
          <div class="item-overlay">
            <span class="item-tag">${CATEGORY_LABELS[item.category] || item.category || ''}</span>
            <span class="item-title">${item.title}</span>
          </div>
        `;
        div.addEventListener('click', () => openLightbox(i));
        grid.appendChild(div);
      });
    }

    function filterGrid(filter) {
      const visibleItems = filter === 'all'
        ? allItems
        : allItems.filter(i => i.category === filter);

      buildGrid(visibleItems);
    }

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg = lightbox.querySelector('.lb-img');
    const lbCaption = lightbox.querySelector('.lightbox-caption');

    function openLightbox(index) {
      lightboxIndex = index;
      lbImg.src = lightboxItems[index].img;
      lbImg.alt = lightboxItems[index].title;
      lbCaption.textContent = lightboxItems[index].title;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      lightboxIndex = (lightboxIndex + dir + lightboxItems.length) % lightboxItems.length;
      openLightbox(lightboxIndex);
    }

    lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
    lightbox.querySelector('.lightbox-prev').addEventListener('click', () => navigate(-1));
    lightbox.querySelector('.lightbox-next').addEventListener('click', () => navigate(1));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>
</body>
</html>
